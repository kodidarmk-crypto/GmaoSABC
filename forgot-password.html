<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password | SABC</title>
  <link rel="icon" type="image/png" href="image001.png"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="forgot-password.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="page-wrapper">

    <!-- LOGO -->
    <div class="logo-bar">
      <img src="image001.png" alt="Logo Brasserie" class="logo"/>
    </div>

    <div class="card card--narrow">
      <!-- LEFT decorative panel -->
       <div class="card__left">
        <img src="message.svg" alt="illustration" style="width:100%; max-width:300px;"/>
      </div>

      <!-- RIGHT — form -->
      <div class="card__right">
        <h1 class="title" style="margin-top:16px">Forgot password?</h1>
        <p class="subtitle">No worries. Enter your e-mail address and we'll send you a reset link.</p>

        <!-- Step 1: email input -->
        <div id="stepEmail">
          <div class="field-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="exemple@sabc.cm" autocomplete="email" />
            <span class="field-error" id="email-error"></span>
          </div>

          <button class="btn-primary" id="btn-send" onclick="sendResetLink()">
            <span id="btn-send-label">Send Link!</span>
            <span id="btn-send-spinner" class="btn-spinner" style="display:none"></span>
          </button>

          <p class="form-footer">
            <a href="index.html" class="link-muted">← Back to Login</a>
          </p>
        </div>

        <!-- Step 2: success state -->
        <div id="step-confirm" style="display:none">
          <div class="info-box">
            <div class="icon-wrap">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25H4.5a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5H4.5a2.25 2.25 0 00-2.25 2.25m19.5 0-9.75 6.75L2.25 6.75" />
              </svg>
            </div>
            <p>Reset link sent to<br>
              <strong id="confirm-email"></strong><br><br>
               Check your inbox (and spam folder).<br>
              The link will expire in <strong>1 hour</strong>.
              </p>
          </div>
          <p class="login-link">Already have an account? <a href="index.html" class="link bold">login</a></p>
        </div>

      </div>
    </div>

  </div>
  <footer class="footer">
    &copy; 2026, by Kochere Djiomegni for SABC
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="forgot-password.js"></script>
</body>
</html>
