<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up | SABC</title>
  <link rel="icon" type="image/png" href="image001.png"/>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <style>
    .info-box {
      background: var(--red-faint, rgba(192,57,43,0.07));
      border: 1.5px solid rgba(192,57,43,0.2);
      border-radius: 12px;
      padding: 28px 24px;
      margin-bottom: 28px;
      text-align: center;
    }
    .info-box .icon-wrap {
      width: 56px; height: 56px;
      background: rgba(192,57,43,0.1);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      color: #C0392B;
    }
    .info-box .icon-wrap svg { width: 26px; height: 26px; }
    .info-box p {
      font-size: 0.92rem;
      color: #1A1A2E;
      line-height: 1.7;
    }
    .info-box p strong {
      color: #C0392B;
    }
  </style>
</head>
<body>
  <div class="page-wrapper">

    <!-- LOGO -->
    <div class="logo-bar">
      <img src="image001.png" alt="Logo Brasserie" class="logo"/>
    </div>

    <div class="card">

      <!-- LEFT — même illustration -->
      <div class="card__left">
        <img src="logistics.svg" alt="illustration" style="width:100%; max-width:380px;"/>
      </div>

      <!-- RIGHT — message -->
      <div class="card__right">
        <h1 class="title">Sign Up</h1>
        <p class="subtitle">Computerised Management Platform — SABC</p>

        <div class="info-box">
          <div class="icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
            </svg>
          </div>
          <p>
            To register, please visit a
            <strong>mechanical or administrative superior</strong>.<br><br>
            They will create your account and provide you with your login credentials.
          </p>
        </div>

        <a href="index.html" class="btn-primary" style="text-decoration:none; display:flex; align-items:center; justify-content:center; gap:8px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="15" height="15">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
          </svg>
          Already have an account? Login
        </a>

      </div>
    </div>
    
  </div>
  <footer class="footer">
      &copy; 2026, by Kochere Djiomegni for SABC
  <footer>
</body>
</html>
